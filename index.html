      <h1>Spatial Reasoning</h1>
      <p>An interactive web-based spatial reasoning test suite built with React and Three.js. This application requires JavaScript to run.</p>
      <h2>About</h2>
      <p>Spatial reasoning — the ability to mentally visualize and manipulate objects in three dimensions — is a core cognitive skill used in fields like engineering, architecture, surgery, and software development. This project provides a set of interactive 3D puzzles designed to assess and exercise these abilities.</p>
      <h2>Puzzles</h2>
      <h3>Cube Rotation</h3>
      <p>Nine cubes are placed at distinct positions within a 3x3x3 grid, each with distinct faces. The player rotates the 3D arrangement to inspect it — each face of the overall cube shows a flat 3x3 pattern made up of the visible faces from that direction. Given four candidate views, the player must identify which one is valid. Tests mental rotation and understanding of 3D constraints.</p>
      <h3>Sphere Arrangement</h3>
      <p>Colored spheres are arranged in a 3D structure — eight at the corners and six at the face centers. The player rotates the structure to examine it, and is shown four neighborhoods — three real, one fabricated. The player must find and remove the wrong one. Tests 3D spatial reasoning and the ability to mentally decompose a 3D structure into local patterns.</p>
      <h3>Box Projection</h3>
      <p>Colored 3D shapes are placed inside a box. The player sees two of the three orthographic projections while the third shows "?". Given four candidate projections, the player must identify the correct one. Tests perspective taking and the ability to reason about how 3D objects project onto 2D planes from different directions.</p>
      <p>Built by <a href="https://www.immersus-machina.com">Immersus Machina</a></p>
